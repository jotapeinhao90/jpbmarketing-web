<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Mensaje Recibido! | JPB Marketing</title>
  <meta name="description" content="Tu solicitud ha sido recibida. Nos pondremos en contacto contigo pronto.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c18;
      --surface: #0d1424;
      --cyan: #0abedc;
      --cyan-glow: rgba(10, 190, 220, 0.15);
      --text: #e2e8f0;
      --text-muted: #7a8ba8;
      --green: #25d366;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(10, 190, 220, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(168, 85, 247, 0.04) 0%, transparent 50%);
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 580px;
      padding: 2rem;
    }

    /* Success checkmark */
    .check-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--cyan-glow);
      border: 2px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 0 40px rgba(10, 190, 220, 0.2);
    }

    .check-circle svg {
      width: 48px;
      height: 48px;
      stroke: var(--cyan);
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawCheck 0.6s 0.4s ease forwards;
    }

    @keyframes scaleIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    h1 span {
      background: linear-gradient(135deg, var(--cyan), #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--green);
      color: #fff;
      padding: 16px 36px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      animation: fadeUp 0.6s 0.7s ease both;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
    }

    .whatsapp-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 30px rgba(37, 211, 102, 0.45);
    }

    .whatsapp-btn svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-decoration: none;
      transition: color 0.3s;
      animation: fadeUp 0.6s 0.9s ease both;
    }

    .back-link:hover {
      color: var(--cyan);
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Floating particles */
    .particle {
      position: fixed;
      width: 3px;
      height: 3px;
      background: var(--cyan);
      border-radius: 50%;
      opacity: 0;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { opacity: 0; transform: translateY(100vh); }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-10vh); }
    }
  </style>
</head>
<body>
  <!-- Floating particles -->
  <div class="particle" style="left:10%; animation-delay:0s; animation-duration:7s;"></div>
  <div class="particle" style="left:25%; animation-delay:1.2s; animation-duration:6s;"></div>
  <div class="particle" style="left:40%; animation-delay:2.5s; animation-duration:8s;"></div>
  <div class="particle" style="left:55%; animation-delay:0.8s; animation-duration:5s;"></div>
  <div class="particle" style="left:70%; animation-delay:3s; animation-duration:7s;"></div>
  <div class="particle" style="left:85%; animation-delay:1.5s; animation-duration:6.5s;"></div>
  <div class="particle" style="left:92%; animation-delay:2s; animation-duration:9s;"></div>

  <div class="container">
    <div class="check-circle">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <h1>¡Mensaje <span>recibido</span>!</h1>

    <p class="subtitle">
      Nuestro equipo revisará tu solicitud y te contactaremos en las próximas <strong>24 horas hábiles</strong>.<br><br>
      Si necesitas una respuesta más rápida, escríbenos directamente por WhatsApp 👇
    </p>

      Hablar por WhatsApp

    <a href="/" class="back-link">← Volver al inicio</a>
  </div>
</body>
</html>
